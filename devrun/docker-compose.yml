services:
  postgres:
    image: postgres:16
    container_name: netbox-rpki-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: netbox-rpki-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  routinator:
    image: nlnetlabs/routinator:latest
    container_name: netbox-rpki-routinator
    restart: unless-stopped
    command:
      - --repository-dir
      - /home/routinator/.rpki-cache/repository
      - --enable-aspa
      - server
      - --rtr
      - 0.0.0.0:3323
      - --http
      - 0.0.0.0:8323
      - --http
      - 0.0.0.0:9556
    ports:
      - "127.0.0.1:${ROUTINATOR_RTR_PORT}:3323"
      - "127.0.0.1:${ROUTINATOR_HTTP_PORT}:8323"
      - "127.0.0.1:${ROUTINATOR_METRICS_PORT}:9556"
    volumes:
      - routinator_cache:/home/routinator/.rpki-cache

  irrd:
    build:
      context: ./irrd
    container_name: netbox-rpki-irrd
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      IRRD_DATABASE_NAME: ${IRRD_DATABASE_NAME}
      IRRD_DATABASE_USER: ${IRRD_DATABASE_USER}
      IRRD_DATABASE_PASSWORD: ${IRRD_DATABASE_PASSWORD}
      IRRD_HTTP_PORT: 8000
      IRRD_WHOIS_PORT: 6043
      IRRD_EXTERNAL_HTTP_URL: http://127.0.0.1:${IRRD_HTTP_PORT}/
      IRRD_SOURCE: ${IRRD_SOURCE}
      IRRD_OVERRIDE_PASSWORD: ${IRRD_OVERRIDE_PASSWORD}
    ports:
      - "127.0.0.1:${IRRD_HTTP_PORT}:8000"
      - "127.0.0.1:${IRRD_WHOIS_PORT}:6043"
    volumes:
      - irrd_state:/var/lib/irrd
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/v1/status/"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  routinator_cache:
  irrd_state: