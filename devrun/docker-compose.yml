services:
  postgres:
    image: postgres:16
    container_name: netbox-rpki-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: netbox-rpki-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  routinator:
    image: nlnetlabs/routinator:latest
    container_name: netbox-rpki-routinator
    restart: unless-stopped
    command:
      - --repository-dir
      - /home/routinator/.rpki-cache/repository
      - --enable-aspa
      - server
      - --rtr
      - 0.0.0.0:3323
      - --http
      - 0.0.0.0:8323
      - --http
      - 0.0.0.0:9556
    ports:
      - "127.0.0.1:${ROUTINATOR_RTR_PORT}:3323"
      - "127.0.0.1:${ROUTINATOR_HTTP_PORT}:8323"
      - "127.0.0.1:${ROUTINATOR_METRICS_PORT}:9556"
    volumes:
      - routinator_cache:/home/routinator/.rpki-cache

volumes:
  postgres_data:
  routinator_cache: